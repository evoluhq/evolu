name: "Setup and install"
description: "Common setup steps for Actions"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version-file: ".nvmrc"
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.9"

    - shell: bash
      run: bun install --frozen-lockfile
