name: "Setup and install"
description: "Common setup steps for Actions"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5
      with:
        cache: true

    - uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"

    - shell: bash
      run: pnpm install --frozen-lockfile
