# Socket Security GitHub Actions Workflow
# This workflow runs Socket Security scans on every commit to any branch
# It automatically detects git repository information and handles different event types

name: socket-security-workflow
run-name: Socket Security Github Action

on:
  push:
    branches: ["**"] # Run on all branches, all commits
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

# Prevent concurrent runs for the same commit
concurrency:
  group: socket-scan-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  socket-security:
    permissions:
      issues: write
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # For PRs, fetch one additional commit for proper diff analysis
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Socket CLI
        run: pip install socketsecurity==2.4.20

      - name: Run Socket Security Scan
        env:
          SOCKET_SECURITY_API_TOKEN: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail

          # Determine PR number based on event type
          PR_NUMBER=0
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
          elif [ "${{ github.event_name }}" == "issue_comment" ]; then
            PR_NUMBER=${{ github.event.issue.number }}
          fi

          run_socket_scan() {
            # The CLI automatically detects:
            # - Repository name from git
            # - Branch name from git
            # - Commit SHA from git
            # - Commit message from git
            # - Committer information from git
            # - Default branch status from git and GitHub environment
            # - Changed files from git commit
            socketcli \
              --target-path "$GITHUB_WORKSPACE" \
              --scm github \
              --pr-number "$PR_NUMBER"
          }

          MAX_ATTEMPTS=3
          ATTEMPT=1
          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            LOG_FILE="$(mktemp -p "${RUNNER_TEMP:-/tmp}" socket-scan-attempt.XXXXXX.log)"
            if run_socket_scan 2>&1 | tee "$LOG_FILE"; then
              rm -f "$LOG_FILE"
              break
            fi

            # Socket CLI surfaces API failures in logs as "original_status_code:<code>".
            if [ -r "$LOG_FILE" ] && grep -Eq "original_status_code:5[0-9][0-9]" "$LOG_FILE" && [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
              NEXT_ATTEMPT=$((ATTEMPT + 1))
              echo "Socket API returned a 5xx response. Retrying in 60 seconds (next attempt $NEXT_ATTEMPT/$MAX_ATTEMPTS)."
              rm -f "$LOG_FILE"
              ATTEMPT="$NEXT_ATTEMPT"
              sleep 60
              continue
            fi

            rm -f "$LOG_FILE"
            exit 1
          done
