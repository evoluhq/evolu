name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # for manual triggering

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write # Required for OIDC trusted publishing
  contents: write # Required for creating releases
  pull-requests: write # Required for changesets to update PRs

jobs:
  release:
    # prevents this action from running on forks
    if: github.repository == 'evoluhq/evolu'
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm 11.5.1+ for trusted publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @evolu/common exec playwright install --with-deps chromium firefox webkit

      - name: Verify
        run: pnpm verify

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
